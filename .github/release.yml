name: Package and Release Skill

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Package skill
        run: |
          cd requirements-engineering
          zip -r ../requirements-engineering.skill . -x "*.git*" -x "*__pycache__*" -x "*.pyc"
          cd ..
          ls -lh requirements-engineering.skill
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: requirements-engineering.skill
          body: |
            ## Requirements Engineering Agent Skill
            
            Transform vague requirements into well-defined, testable specifications.
            
            ### Installation
            
            **Claude.ai / Claude Code:**
            Download the `requirements-engineering.skill` file and upload to your Claude project.
            
            **skills CLI:**
            ```bash
            npx skills add ${{ github.repository }}
            ```
            
            **Manual Install:**
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cp -r requirements-engineering-skill/requirements-engineering ~/.your-agent/skills/
            ```
            
            See [INSTALLATION.md](https://github.com/${{ github.repository }}/blob/main/INSTALLATION.md) for detailed instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact (for manual workflow dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: requirements-engineering-skill
          path: requirements-engineering.skill
