name: Package and Release Skill

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package skill
        run: |
          zip -r requirements-engineering.skill \
            requirements-engineering/ \
            .claude-plugin/ \
            README.md \
            LICENSE \
            -x "*.git*" -x "*__pycache__*" -x "*.pyc"
          ls -lh requirements-engineering.skill

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: requirements-engineering.skill
          generate_release_notes: true
          body: |
            ## Requirements Engineering Skill

            Transform vague requirements into well-defined, testable specifications using BDD, Use Cases, Model Specs, Payload Contracts, and diagrams. Based on Essential Developer methodology.

            ### Installation

            **Claude Code / skills CLI (recommended):**
            ```bash
            npx skills add SwiftyJourney/requirements-engineering-skill
            ```

            **Manual:**
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            ```

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for full details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: requirements-engineering-skill
          path: requirements-engineering.skill
